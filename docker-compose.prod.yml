# ═══════════════════════════════════════════════════════════════════════════
# РС ИТО — продакшен compose
#
# Архитектура на сервере jenelle:
#   • PostgreSQL и Qdrant — уже стоят на хосте (контейнеры legal-backend-*),
#     слушают 127.0.0.1:5432 и 127.0.0.1:6333. Подключаемся через
#     host.docker.internal (extra_hosts ниже).
#   • Frontend — собирается через `npm run build` и складывается в
#     /var/www/rsito-dev/, раздаётся хост-nginx (без docker).
#   • Backend (этот compose) — единственный сервис, слушает 127.0.0.1:8010,
#     хост-nginx проксирует /api/ на этот порт.
# ═══════════════════════════════════════════════════════════════════════════

services:
  app:
    build: ./backend
    image: rs-ito-backend:latest
    container_name: rs-ito-app
    env_file: ./backend/.env
    # Слушаем только loopback хоста — наружу пробрасывает хост-nginx
    # с TLS-сертификатом для dev.lex-pro-assistant.ru
    ports:
      - "127.0.0.1:8010:8010"
    # Доступ к PostgreSQL/Qdrant, которые слушают на хосте
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
