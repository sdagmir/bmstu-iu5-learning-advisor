server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip — статика и небольшие тексты
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback: всё что не файл — на index.html, чтобы React Router работал
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Прокси API на backend контейнер. Имя `app` совпадает с именем сервиса
    # в docker-compose, который должен находиться в одной сети с этим nginx.
    location /api/ {
        proxy_pass http://app:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM-ответы могут идти долго; стандартные 60s маловато.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Длинный кэш для версионированных ассетов от Vite (имена с хэшем).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — без кэша, чтобы свежий билд подхватывался сразу.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
