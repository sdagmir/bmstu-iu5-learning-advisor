services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rs_ito
      POSTGRES_PASSWORD: rs_ito
      POSTGRES_DB: rs_ito
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rs_ito -d rs_ito"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  app:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    env_file: ./backend/.env.local
    ports:
      - "8010:8010"
    volumes:
      - ./backend/app:/code/app
      - ./backend/tests:/code/tests
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
